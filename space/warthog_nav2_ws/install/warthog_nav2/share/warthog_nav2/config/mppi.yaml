controller_server:
  ros__parameters:
    use_sim_time: true

    controller_frequency: 20.0
    controller_plugins: ["MPPI"]

    MPPI:
      plugin: "nav2_mppi_controller::MPPIController"

      time_steps: 25
      model_dt: 0.1
      batch_size: 2000

      vx_std: 0.3
      vy_std: 0.0
      wz_std: 0.5

      max_vel_x: 1.0
      min_vel_x: -0.5
      max_vel_theta: 1.2

      goal_cost_weight: 5.0
      obstacle_cost_weight: 40.0
      control_cost_weight: 0.01

      odom_frame: "odom"
      base_link_frame: "base_link"

    # ====================================================================
    # INTERNAL COSTMAP OVERRIDE (THE CRITICAL FIX)
    # ====================================================================
    local_costmap:
      local_costmap:
        ros__parameters:

          use_sim_time: true

          global_frame: "odom"
          robot_base_frame: "base_link"
          rolling_window: true

          update_frequency: 10.0
          publish_frequency: 10.0

          width: 20.0
          height: 20.0
          resolution: 0.1

          plugins: ["obstacle_layer", "inflation_layer"]

          obstacle_layer:
            plugin: "nav2_costmap_2d::ObstacleLayer"
            observation_sources: ["lidar"]
            lidar:
              topic: "/point_cloud"
              data_type: "PointCloud2"
              sensor_frame: "lidar_mount_link"
              marking: true
              clearing: true
              max_obstacle_height: 2.0
              obstacle_range: 5.0
              raytrace_range: 6.0

          inflation_layer:
            plugin: "nav2_costmap_2d::InflationLayer"
            inflation_radius: 0.5

